# Online evaluation example — offline-runnable.
#
# The dataset is a YAML fixture of "production" traces (see
# embedded_traces.yaml). In a real deployment the same eval.yaml shape
# works with `dataset.type: langfuse` (or phoenix / arize / otel) once
# those adapters ship — only the dataset block changes; everything below
# stays the same. This fixture form keeps the pipeline runnable on a
# fresh checkout with no API keys.
#
# Runnable: `evalh run examples/online_eval/eval.yaml`

eval:
  name: production_quality_check
  description: "Score 'production' traffic offline via the fixture DatasetAdapter."
  tags: [online-eval, replay, fixture]

metadata:
  judge_model: claude-4-7
  source: fixture

# The fixture adapter reads embedded_traces.yaml and attaches each case's
# full upstream Trace, which the `replay` SystemAdapter then unwraps.
# Set `embed_full_trace: true` so every case carries its trace.
dataset:
  type: fixture
  path: examples/online_eval/embedded_traces.yaml
  embed_full_trace: true

systems:
  # Variant 1: the production trace as it actually ran. No system call.
  - name: production_replay
    adapter: replay
    metadata:
      kind: replay
      source: fixture

  # Variant 2 (optional): backtest a candidate prompt against the same
  # inputs. Uncomment + start your service to run it. Without
  # $AGENT_API_KEY the runner short-circuits this variant with a
  # configuration error — keep it commented for the offline smoke path.
  #
  # - name: candidate_v4
  #   adapter: http
  #   endpoint: http://localhost:8000/chat
  #   timeout_seconds: 60
  #   headers:
  #     Authorization: "Bearer ${AGENT_API_KEY}"
  #   request_template: |
  #     { "user_message": "{{ input.user_message }}", "session_id": "{{ case_id }}" }
  #   response_mapping:
  #     final_answer: $.answer
  #     tool_calls: $.tool_calls
  #   metadata:
  #     kind: candidate
  #     branch: feat/v4-prompt
  #     model: claude-4-7

evaluators:
  - name: must_call_listing_tool
    type: tool_called
    config:
      tool_name: get_listing_details

  - name: must_call_suburb_price_tool
    type: tool_called
    config:
      tool_name: get_average_suburb_price

  - name: answer_mentions_suburb
    type: contains_text
    config:
      any_of: [Richmond, Brunswick, Carlton]
      case_sensitive: false

pass_criteria:
  all_required:
    - must_call_listing_tool
    - must_call_suburb_price_tool
    - answer_mentions_suburb

run:
  max_concurrency: 4
  baseline_variant: production_replay

output:
  - type: local_files
    path: runs/
